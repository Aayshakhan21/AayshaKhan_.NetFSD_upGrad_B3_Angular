<!DOCTYPE html>
<html>
<head>
<title>College Event Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">College Events</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Students</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">

    <div class="col-lg-8">
      <div class="card p-3">
        <h4>Upcoming Events</h4>
        <div id="eventList">
          <div class="border p-2 mb-2 d-flex justify-content-between">
            Tech Fest - 20 March
            <button class="btn btn-danger btn-sm delete">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card p-3 text-center">
        <h5>Add New Event</h5>
        <button class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#eventModal">
          Add Event
        </button>
      </div>
    </div>

  </div>
</div>

<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="eventForm" class="needs-validation" novalidate>

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" id="eventName" required>
            <div class="invalid-feedback">Enter event name</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Event Date</label>
            <input type="date" class="form-control" id="eventDate" required>
            <div class="invalid-feedback">Select date</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="eventDesc" required></textarea>
            <div class="invalid-feedback">Enter description</div>
          </div>

          <button class="btn btn-success w-100" type="submit">Save Event</button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
const form = document.getElementById("eventForm");
const eventList = document.getElementById("eventList");

form.addEventListener("submit", function(e){
  e.preventDefault();

  if(!form.checkValidity()){
    form.classList.add("was-validated");
    return;
  }

  let name = document.getElementById("eventName").value;
  let date = document.getElementById("eventDate").value;

  let div = document.createElement("div");
  div.className = "border p-2 mb-2 d-flex justify-content-between";
  div.innerHTML = `
    ${name} - ${date}
    <button class="btn btn-danger btn-sm delete">Delete</button>
  `;

  eventList.appendChild(div);

  let modal = bootstrap.Modal.getInstance(document.getElementById('eventModal'));
  modal.hide();

  form.reset();
  form.classList.remove("was-validated");
});

eventList.addEventListener("click", function(e){
  if(e.target.classList.contains("delete")){
    e.target.parentElement.remove();
  }
});
</script>

</body>
</html>
